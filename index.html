<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>펀드 관리 시스템 - 로그인</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>body { font-family: 'Pretendard', sans-serif; }</style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl border w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-tight mb-2">펀드 관리 시스템</h1>
            <p class="text-gray-500 text-sm font-medium">서비스 이용을 위해 로그인해주세요.</p>
        </div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">ID</label>
                <input type="text" id="loginId" placeholder="ID를 입력하세요" onkeydown="handleKeyDown(event)" class="w-full p-3 border-2 border-gray-200 rounded-xl text-sm focus:border-blue-600 focus:outline-none transition-all">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 mb-1">패스워드</label>
                <input type="password" id="loginPassword" placeholder="패스워드를 입력하세요" onkeydown="handleKeyDown(event)" class="w-full p-3 border-2 border-gray-200 rounded-xl text-sm focus:border-blue-600 focus:outline-none transition-all">
            </div>

            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-3 rounded-xl text-sm shadow-md transition-all mt-6">
                로그인
            </button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://hnxvsopwxiamexnxczhj.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_1_9-bKTcV3sBQkv10ru__w_iW-51pKt";
        
        // Supabase 클라이언트 초기화
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 엔터키 입력 시 로그인 함수 호출
        function handleKeyDown(event) {
            if (event.key === 'Enter') {
                handleLogin();
            }
        }

        async function handleLogin() {
            const id = document.getElementById('loginId').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            if (!id) {
                alert("ID를 입력해주세요.");
                return;
            }
            if (!password) {
                alert("패스워드를 입력해주세요.");
                return;
            }

            try {
                // repo_users 테이블에서 id와 pass가 일치하는 사용자 조회
                const { data, error } = await supabaseClient
                    .from('repo_users')
                    .select('*')
                    .eq('user_id', id)
                    .eq('user_pw', password);

                // 1. 네트워크나 SQL 문법, RLS 권한 에러 처리
                if (error) {
                    console.error("Supabase 에러 상세:", error);
                    alert("Supabase 에러가 발생했습니다.\n이유: " + error.message + "\n\n💡 해결방법: Supabase 웹 사이트에서 repo_users 테이블의 RLS(Row Level Security) 권한이 비활성화(Disabled)되어 있는지 확인하거나, SELECT 허용 Policy를 추가해 주세요.");
                    return;
                }

                // 2. 일치하는 유저가 없는 경우 (배열이 비어있음)
                if (!data || data.length === 0) {
                    alert("아이디 또는 비밀번호가 올바르지 않습니다.");
                    return;
                }

                // 로그인 성공 시 첫 번째 행 데이터 가져오기
                const user = data[0];

                // 브라우저에 로그인 정보 저장
                localStorage.setItem('login_id', user.user_id);

                // 아이디별 페이지 분기 처리
                if (user.user_id === 'admin') {
                    location.href = 'admin.html';
                } else {
                    location.href = 'manager.html';
                }

            } catch (err) {
                console.error("시스템 오류 상세:", err);
                alert("로그인 처리 중 예기치 못한 시스템 오류가 발생했습니다.");
            }
        }
    </script>
</body>
</html>
