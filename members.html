<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운용사 계정 관리</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>

// 페이지 로드 시 관리자 여부 확인
    (function() {
        const loginId = localStorage.getItem('login_id');
        // 'admin' 계정이 아니면 로그인 페이지로 강제 이동
        if (loginId !== 'admin') {
            alert("관리자 전용 페이지입니다. 로그인 후 이용해주세요.");
            window.location.href = 'index.html';
        }
    })();
    
// 이후 기존 로직들...



        const SUPABASE_URL = 'https://hnxvsopwxiamexnxczhj.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_1_9-bKTcV3sBQkv10ru__w_iW-51pKt';

     
        // 2. 공통 DB 요청 함수
        async function dbRequest(table, method, body = null, query = "") {
            const url = `${SUPABASE_URL}/rest/v1/${table}${query}`;
            const options = {
                method,
                headers: {
                    "apikey": SUPABASE_KEY,
                    "Authorization": `Bearer ${SUPABASE_KEY}`,
                    "Content-Type": "application/json",
                    "Prefer": "return=representation"
                }
            };
            if (body) options.body = JSON.stringify(body);
            const res = await fetch(url, options);
            if (!res.ok) throw new Error(await res.text());
            return await res.json();
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen p-8">

    <header class="mb-8 flex justify-between items-center">
        <h1 class="text-2xl font-black">운용사 계정 관리</h1>
        <a href="admin.html" class="text-sm font-bold text-gray-500 hover:text-black transition-all">대시보드로 돌아가기</a>
    </header>

    <div class="bg-white p-6 rounded-2xl border shadow-sm mb-8">
        <h2 class="font-bold mb-4" id="formTitle">신규 운용사 등록</h2>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <input type="hidden" id="editId">
            <input type="text" id="compName" placeholder="운용사명" class="p-2 border rounded text-sm">
            <input type="text" id="userId" placeholder="ID" class="p-2 border rounded text-sm">
            <input type="text" id="userPw" placeholder="비밀번호" class="p-2 border rounded text-sm">
            <button onclick="saveCompany()" class="bg-blue-600 text-white rounded font-bold text-sm hover:bg-blue-700">저장하기</button>
        </div>
    </div>

    <div class="bg-white p-6 rounded-2xl border shadow-sm">
        <table class="w-full text-center border-collapse text-sm">
            <thead>
                <tr class="bg-gray-50 border-b">
                    <th class="p-3">운용사명</th>
                    <th class="p-3">ID</th>
                    <th class="p-3">비밀번호</th>
                    <th class="p-3">관리</th>
                </tr>
            </thead>
            <tbody id="compTableBody"></tbody>
        </table>
    </div>

    <script>

        async function loadCompanies() {
            try {
                const companies = await dbRequest('repo_users', 'GET');
                const tbody = document.getElementById('compTableBody');
                tbody.innerHTML = companies.map(c => `
                    <tr class="border-b">
                        <td class="p-3">${c.company_name}</td>
                        <td class="p-3">${c.user_id}</td>
                        <td class="p-3">${c.user_pw}</td>
                        <td class="p-3">
                            <button onclick="editMode(${c.id}, '${c.company_name}', '${c.user_id}', '${c.user_pw}')" class="text-blue-500 mr-4 font-bold">수정</button>
                            <button onclick="deleteCompany(${c.id})" class="text-red-500 font-bold">삭제</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                console.error("데이터 로드 실패:", e);
            }
        }

        async function saveCompany() {
            const id = document.getElementById('editId').value;
            const data = {
                company_name: document.getElementById('compName').value,
                user_id: document.getElementById('userId').value,
                user_pw: document.getElementById('userPw').value
            };
            
            if (!data.company_name || !data.user_id || !data.user_pw) return alert("모든 항목을 입력하세요.");

            try {
                if (id) {
                    await dbRequest('repo_users', 'PATCH', data, `?id=eq.${id}`);
                } else {
                    await dbRequest('repo_users', 'POST', data);
                }
                location.reload();
            } catch (e) {
                alert("저장 실패: " + e.message);
            }
        }

        function editMode(id, name, uid, pw) {
            document.getElementById('editId').value = id;
            document.getElementById('compName').value = name;
            document.getElementById('userId').value = uid;
            document.getElementById('userPw').value = pw;
            document.getElementById('formTitle').innerText = "운용사 정보 수정";
        }

        async function deleteCompany(id) {
            if(!confirm("삭제하시겠습니까?")) return;
            await dbRequest('repo_users', 'DELETE', null, `?id=eq.${id}`);
            location.reload();
        }

        loadCompanies();
    </script>
</body>
</html>
